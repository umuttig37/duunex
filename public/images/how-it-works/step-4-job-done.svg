<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0FDF4"/>
  
  <!-- Payment success screen -->
  <rect x="100" y="50" width="200" height="180" rx="16" fill="white" stroke="#D1FAE5" stroke-width="2"/>
  
  <!-- Success checkmark -->
  <circle cx="200" cy="110" r="25" fill="#10B981"/>
  <path d="M190 110L197 117L210 104" stroke="white" stroke-width="3" fill="none"/>
  
  <!-- Success text -->
  <text x="200" y="145" text-anchor="middle" fill="#059669" font-family="Arial" font-size="14" font-weight="bold">Maksu onnistui!</text>
  <text x="200" y="160" text-anchor="middle" fill="#6B7280" font-family="Arial" font-size="10">Työ voidaan aloittaa</text>
  
  <!-- Payment details -->
  <rect x="120" y="175" width="160" height="1" fill="#E5E7EB"/>
  <text x="130" y="190" fill="#6B7280" font-family="Arial" font-size="10">Summa:</text>
  <text x="270" y="190" text-anchor="end" fill="#374151" font-family="Arial" font-size="10" font-weight="bold">45,00 €</text>
  <text x="130" y="205" fill="#6B7280" font-family="Arial" font-size="10">Paytrail</text>
  <text x="270" y="205" text-anchor="end" fill="#10B981" font-family="Arial" font-size="10">✓ Turvallinen</text>
  
  <!-- Rating stars component -->
  <rect x="60" y="250" width="280" height="40" rx="12" fill="white" stroke="#D1FAE5" stroke-width="1"/>
  <text x="80" y="267" fill="#374151" font-family="Arial" font-size="10">Arvostele tekijä:</text>
  
  <!-- Rating stars -->
  <g transform="translate(180, 255)">
    <polygon points="5,0 6,3 10,3 7,5 8,9 5,7 2,9 3,5 0,3 4,3" fill="#F59E0B"/>
    <polygon points="18,0 19,3 23,3 20,5 21,9 18,7 15,9 16,5 13,3 17,3" fill="#F59E0B"/>
    <polygon points="31,0 32,3 36,3 33,5 34,9 31,7 28,9 29,5 26,3 30,3" fill="#F59E0B"/>
    <polygon points="44,0 45,3 49,3 46,5 47,9 44,7 41,9 42,5 39,3 43,3" fill="#F59E0B"/>
    <polygon points="57,0 58,3 62,3 59,5 60,9 57,7 54,9 55,5 52,3 56,3" fill="#F59E0B"/>
  </g>
  
  <!-- Shield/security icon -->
  <circle cx="50" cy="150" r="25" fill="#10B981" opacity="0.1"/>
  <path d="M50 130L42 138V155C42 160 46 164 50 164C54 164 58 160 58 155V138L50 130Z" fill="#10B981"/>
  <path d="M46 145L49 148L54 140" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Credit card icon -->
  <circle cx="350" cy="80" r="20" fill="#FEF3C7"/>
  <rect x="340" y="75" width="20" height="12" rx="2" fill="#F59E0B"/>
  <rect x="342" y="77" width="16" height="2" fill="#FEF3C7"/>
  <rect x="342" y="83" width="6" height="1" fill="#FEF3C7"/>
  
  <!-- Floating elements -->
  <circle cx="30" cy="80" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="370" cy="250" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="50" cy="250" r="2" fill="#F59E0B" opacity="0.3"/>
</svg>
