<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="50%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="10" dy="20" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rectangle for subtle framing -->
  <rect x="40" y="40" width="720" height="720" rx="140" fill="url(#bgGrad)"/>

  <!-- Stylized lightning bolt -->
  <g transform="translate(200,120) rotate(12 200 280)" filter="url(#dropShadow)">
    <path d="M220 0 L80 280 H200 L110 560 L360 240 H240 L330 0 Z" fill="url(#boltGrad)"/>
    <path d="M220 0 L80 280 H200 L110 560 L360 240 H240 L330 0 Z" fill="#10B981" fill-opacity="0.08"/>
  </g>

  <!-- Soft inner highlight -->
  <ellipse cx="520" cy="220" rx="160" ry="60" fill="#FFFFFF" opacity="0.08"/>
</svg>


